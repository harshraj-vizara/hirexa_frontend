<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluenzo - LinkedIn Sign In</title>
    <style>
        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: #0891b2;
            border-radius: 50%;
            animation: spin 0.8s ease-in-out infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader p {
            color: #64748b;
            font-size: 15px;
        }
        .error {
            color: #dc2626;
            display: none;
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner" id="spinner"></div>
        <p id="status-text">Completing LinkedIn sign in...</p>
        <p class="error" id="error-text"></p>
    </div>

    <script>
        (async function handleLinkedInCallback() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const state = params.get('state');
            const error = params.get('error');

            if (error) {
                showError('LinkedIn sign in was cancelled.');
                return;
            }

            if (!code) {
                showError('No authorization code received from LinkedIn.');
                return;
            }

            try {
                const res = await fetch(`${window.location.origin}/api/auth/linkedin/callback`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, state: state || '' })
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    localStorage.setItem('fluenzoUser', JSON.stringify(data.user));
                    document.getElementById('status-text').textContent = 'Success! Redirecting...';
                    // Check if we should return to a specific page (e.g. job posting after connecting LinkedIn)
                    const returnTo = localStorage.getItem('linkedin_return_to');
                    localStorage.removeItem('linkedin_return_to');
                    setTimeout(() => window.location.href = returnTo || '/b4kx', 500);
                } else {
                    showError(data.detail || 'LinkedIn authentication failed. Please try again.');
                }
            } catch (err) {
                showError('Connection error. Please try again.');
            }
        })();

        function showError(msg) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('status-text').style.display = 'none';
            const el = document.getElementById('error-text');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => window.location.href = '/login', 3000);
        }
    </script>
</body>
</html>
