<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hire XA - Users</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&family=Lexend+Deca:wght@300;400;500;600&family=Fraunces:ital,opsz,wght@1,9..144,300;1,9..144,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/profile.css">
    <link rel="stylesheet" href="/static/css/user_dashboard.css">
    <link rel="stylesheet" href="/static/css/user_dropdown.css">
    <link rel="icon" href="/static/assets/hirexa-favicon.svg" type="image/svg+xml">
</head>
<body>
    <div class="page-loader" id="page-loader" aria-hidden="true"><span class="page-loader-spin"></span></div>
    <div class="dashboard">
        <header class="dash-header">
            <div class="dash-brand">
                <div class="dash-brand-name">HIRE <span class="ai">XA</span></div>
                <div class="dash-brand-sub">XCEED TALENT ACQUISITION</div>
            </div>
            <div data-user-dropdown></div>
        </header>

        <div class="dash-blob" aria-hidden="true"></div>
        <div class="dash-panel" aria-hidden="true"></div>

        <aside class="dash-sidebar">
            <a class="side-item" href="/m3xk" title="Back">
                <span class="side-icon icon-purple"><svg viewBox="0 0 24 24" fill="none" stroke="#9886E9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></span>
                <span class="side-label">Back</span>
            </a>
            <a class="side-item" href="/b4kx">
                <span class="side-icon icon-blue"><svg viewBox="0 0 24 24" fill="none" stroke="#4CABF6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V21a1 1 0 0 1-1 1h-5v-7h-6v7H4a1 1 0 0 1-1-1V9.5z"/></svg></span>
                <span class="side-label">Home</span>
            </a>
            <a class="side-item" href="/d2mw">
                <span class="side-icon icon-green"><svg viewBox="0 0 24 24" fill="#8EC49E"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg></span>
                <span class="side-label">Jobs</span>
            </a>
            <a class="side-item" href="/p8eu">
                <span class="side-icon icon-pink"><svg viewBox="0 0 24 24" fill="none" stroke="#DE9CA7" stroke-width="1.8" stroke-linejoin="round"><polygon points="6,4 20,12 6,20"/></svg></span>
                <span class="side-label">Quick</span>
            </a>
        </aside>

        <main class="ud-main">
            <div class="ud-header">
                <h1 class="ud-heading"><span class="ud-h-all">All</span> <span class="ud-h-users">Users</span></h1>
                <p class="ud-sub" id="ud-sub">&mdash;</p>
            </div>

            <div class="ud-toolbar">
                <div class="ud-chips" id="ud-chips">
                    <button type="button" class="ud-chip is-active" data-filter="all">All (<span id="ud-c-all">0</span>)</button>
                    <button type="button" class="ud-chip" data-filter="active">Active (<span id="ud-c-active">0</span>)</button>
                    <button type="button" class="ud-chip" data-filter="pending">Pending (<span id="ud-c-pending">0</span>)</button>
                </div>
                <div class="ud-search">
                    <input type="search" id="ud-search" name="ud_user_search" placeholder="Search profiles" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" data-lpignore="true" data-1p-ignore readonly>
                    <span class="ud-search-ic"><svg viewBox="0 0 24 24" fill="none" stroke="#4CABF6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
                </div>
            </div>

            <div class="ud-table-card">
                <div class="ud-table">
                    <div class="ud-thead">
                        <span>USER</span><span>ROLE</span><span>STATUS</span>
                        <span class="ud-num">JOBS POSTED</span><span class="ud-num">POSITIONS CLOSED</span><span class="ud-num">IN PROGRESS</span>
                        <span>CREATED</span><span class="ud-act-h">ACTIONS</span>
                    </div>
                    <div class="ud-tbody" id="ud-rows"><div class="ud-empty" id="ud-empty">No team members yet.</div></div>
                </div>
            </div>

            <div class="ud-footer">
                <button type="button" class="ud-add-btn" id="ud-add-btn">+ Add User</button>
            </div>
        </main>
    </div>

    <!-- Add User modal (reuses profile.css .pf-modal styles) -->
    <div class="pf-modal" id="pf-add-modal" hidden>
        <div class="pf-modal-card">
            <button type="button" class="pf-modal-close" data-pf-close aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="18" height="18"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            <h2 class="pf-modal-title">Add User</h2>
            <p class="pf-modal-sub">They'll get an email with a temporary password to set up their account.</p>
            <input type="text" id="add-name" class="pf-input" placeholder="Recruiter name" data-validate="name">
            <input type="email" id="add-email" class="pf-input" placeholder="Email address" data-validate="email">
            <div class="pf-modal-err" id="add-err"></div>
            <button type="button" class="pf-modal-btn" id="add-submit">Add User</button>
        </div>
    </div>

    <!-- Edit team member modal -->
    <div class="pf-modal" id="pf-member-modal" hidden>
        <div class="pf-modal-card">
            <button type="button" class="pf-modal-close" data-pf-close aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="18" height="18"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            <h2 class="pf-modal-title">Edit Member</h2>
            <p class="pf-modal-sub" id="member-sub">&mdash;</p>

            <label class="pf-toggle" for="member-admin">
                <input type="checkbox" id="member-admin">
                <span class="pf-toggle-track"><span class="pf-toggle-thumb"></span></span>
                <span class="pf-toggle-text">
                    <span class="pf-toggle-title">Make admin (transfer ownership)</span>
                    <span class="pf-toggle-desc">Transfers your admin access to this user. They become the sole admin and you become a regular member.</span>
                </span>
            </label>

            <div class="pf-modal-err" id="member-err"></div>
            <div class="pf-modal-actions">
                <button type="button" class="pf-modal-btn pf-btn-danger" id="member-remove">Remove</button>
                <button type="button" class="pf-modal-btn" id="member-save">Save</button>
            </div>
        </div>
    </div>

    <div class="pf-toast" id="pf-toast" hidden></div>

    <script src="/static/js/validation.js"></script>
    <script src="/static/js/user_dropdown.js"></script>
    <script src="/static/js/user_dashboard.js"></script>
</body>
</html>
